name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate files.js
        run: |
          echo "const FILES = [" > files.js
          for f in crossword_*.html; do
            [ -f "$f" ] && echo "  \"$f\"," >> files.js
          done
          echo "];" >> files.js

      - name: Debug
        run: |
          echo "Current directory: $(pwd)"
          ls -la *.js *.html 2>/dev/null || echo "No js/html files found"
          cat files.js 2>/dev/null || echo "files.js not found"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

