<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Parole crociate</title>
  
<script src="files.js"></script>

<style>
:root {
    --bg: rgb(225, 223, 219);
    --card:#fff;
    --text:#2c3e50;
    --sub:#7f8c8d;
    --accent:#3498db;
}

@media (prefers-color-scheme: dark){
:root{
    --bg: rgb(225, 223, 219);
    --card:#2c2c2c;
    --text:#ecf0f1;
    --sub:#bdc3c7;
}}

body {font-family:Arial, Helvetica, sans-serif, serif;background:var(--bg);margin:0;}
.container{max-width:900px;margin:30px auto;padding:8px;}

.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}
input,select{padding:10px;border-radius:8px;border:1px solid #ccc;flex:1;}

.stats{margin-bottom:10px;color:var(--sub);}

.list li{background:var(--card);margin:10px 0;border-radius:12px;list-style:none;}
.list a{display:block;padding:8px;text-decoration:none;color:var(--text);}
.list span{display:block;color:var(--sub);}
.latest{border:2px solid var(--accent);}

.list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    column-gap: 10px;  /* horizontal */
    row-gap: px;     /* vertical */
    padding: 0;
}
@media (max-width: 600px) {
    .list { grid-template-columns: 1fr; }
}
  
</style>
  
</head>

<body>
<div class="container">

<!-- <h1>🧩 Parole crociate</h1> -->
<div style="display: flex; align-items: center; gap: 10px;">
  <img src="./schemacruciverba.png" alt="cw" width="100" height="100">
  <h1 style="margin: 0./sc;">Parole crociate</h1>
</div>

<div class="stats" id="stats"></div>

<div class="controls">
<input id="search" placeholder="Cerca...">
<select id="year"><option value="">Tutti gli anni</option></select>
<select id="sort">
<option value="desc">Più recenti</option>
<option value="asc">Più vecchi</option>
</select>
</div>

<ul id="list" class="list"></ul>

</div>

<script>
const mesi=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
"Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

function parseDate(f){
    //const m=f.match(/crossword_(\\d{12})/);
    const m = f.match(/crossword_(\d{12})/);
    if(!m) return null;
    const s=m[1];
    return new Date(2000+ +s.slice(0,2), s.slice(2,4)-1, s.slice(4,6), s.slice(6,8), s.slice(8,10));
}

function fmt(d){
    return `${d.getDate()} ${mesi[d.getMonth()]} ${d.getFullYear()}, ore ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

let data = FILES.map(f=>({file:f,date:parseDate(f)})).filter(x=>x.date);
const list=document.getElementById("list");
const yearSel=document.getElementById("year");

const years=[...new Set(data.map(x=>x.date.getFullYear()))].sort((a,b)=>b-a);
console.log(years)
years.forEach(y=>{
    let o=document.createElement("option");
    o.value=y;o.textContent=y;
    yearSel.appendChild(o);
});

// URL params
const params=new URLSearchParams(location.search);
if(params.get("year")) yearSel.value=params.get("year");

function render(){
    const search=document.getElementById("search").value.toLowerCase();
    const year=yearSel.value;
    const sort=document.getElementById("sort").value;

    console.log("search",search)    
    console.log("year",year)
    console.log("sort",sort)
    console.log("data",data)

    let filteredOLD=data.filter(x=>
        (!year||x.date.getFullYear()==year)&&
        x.file.toLowerCase().includes(search)
    );

    let filtered = data.filter(x => {
        const matchesYear = !year || x.date.getFullYear() === parseInt(year);
        const matchesSearch = x.file && x.file.toLowerCase().includes(search);
        return matchesYear && matchesSearch;
    });

  
    filtered.sort((a,b)=>sort==="desc"?b.date-a.date:a.date-b.date);

    list.innerHTML="";
    
    filtered.forEach((x,i)=>{
        const li=document.createElement("li");
        if(i===0 && sort==="desc") li.classList.add("latest");

        li.innerHTML=`
        <a href="${x.file}">
            Crossword
            <span>${fmt(x.date)}</span>
        </a>`;
        list.appendChild(li);
    });

    document.getElementById("stats").textContent =
        `${filtered.length} crossword visualizzati su ${data.length}`;

    // aggiorna URL
    const p=new URLSearchParams();
    if(year) p.set("year",year);
    history.replaceState(null,"","?"+p.toString());
}

document.getElementById("search").oninput=render;
yearSel.onchange=render;
document.getElementById("sort").onchange=render;

render();
</script>

</body>
</html>
